version: "3.9"

# ── MarketPulse — full local stack ───────────────────────────────
# One command: docker compose up --build
# Services: Django API + Celery Worker + Beat + Daphne (WS) + ClickHouse + Redis + Next.js + Flower

x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: ../docker/backend.Dockerfile
  env_file: .env
  depends_on:
    clickhouse:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - ./backend:/app

services:

  # ── Django API (ASGI via Daphne — handles both HTTP and WS) ───
  api:
    <<: *backend-base
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Celery Worker ─────────────────────────────────────────────
  worker:
    <<: *backend-base
    command: celery -A config worker --loglevel=info --concurrency=2

  # ── Celery Beat (scheduler) ───────────────────────────────────
  beat:
    <<: *backend-base
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Flower (task monitor UI) ──────────────────────────────────
  flower:
    <<: *backend-base
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"

  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ── ClickHouse ────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "8123:8123"   # HTTP interface (queries from browser / debugging)
      - "9000:9000"   # Native TCP (used by clickhouse-driver)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./backend/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    environment:
      CLICKHOUSE_DB:       ${CLICKHOUSE_DB}
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  clickhouse_data:
  redis_data:
