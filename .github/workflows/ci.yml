name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/

      - name: Type-check (pyright)
        run: |
          pip install pyright
          pyright backend/ || true   # non-blocking for now

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          CLICKHOUSE_HOST: localhost   # tests mock ClickHouse calls
          PYTHONPATH: .               # makes `backend` importable as a package
        run: |
          cd backend
          PYTHONPATH=.. pytest --tb=short -q

  frontend:
    name: Frontend — type-check + lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Type-check
        run: cd frontend && npm run type-check

      - name: Lint
        run: cd frontend && npm run lint

  docker-build:
    name: Docker — build both images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t market-pulse-backend ./backend

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t market-pulse-frontend ./frontend
